name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MIX_ENV: test
  # The Ecto adapter's `:postgres`-tagged tests read this; the service is defined below.
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentix_test

permissions:
  contents: read

jobs:
  check:
    name: Check (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.20"
            otp: "28"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix deps.unlock --check-unused
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix deps.audit
      - run: mix dialyzer
      - run: mix coveralls
      # The DB-free suite runs above (`:postgres` excluded by default); this runs only the
      # Ecto-adapter tests against the Postgres service.
      - run: mix test --only postgres

  external-consume:
    name: External consumption (examples)
    runs-on: ubuntu-latest
    # Proves the optional-dep wiring for a genuine downstream consumer: a Tier-1 headless
    # app (no LiveView/DB) and a Tier-3 app (LiveView + Postgres + Oban), each depending on
    # Agentix via `path:`. Dialyzer is intentionally skipped to avoid a second PLT build.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentix_demo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "28"

      # Tier 1 — headless / API-only. No LiveView, no database; the optional modules must
      # not even compile (asserted inside the suite).
      - name: agentix_api (Tier 1)
        working-directory: examples/agentix_api
        run: |
          mix deps.get
          mix compile
          mix test

      # Tier 3 — LiveView + durable Postgres persistence + Oban-backed expiry.
      - name: agentix_demo (Tier 3)
        working-directory: examples/agentix_demo
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentix_demo_test
        run: |
          mix deps.get
          mix agentix.gen.components lib/agentix_demo_web --module AgentixDemoWeb.AgentixComponents
          mix ecto.create
          mix ecto.migrate
          mix test
